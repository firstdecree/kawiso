[web]
port = 8080 # The port the website will listen to.

[production]
allowRegistration = false # In production you should disable it because currently Kawiso does not have a built-in payment system.

[database]
clusterURL = "" # Your database cluster URL with the credential.
database = "" # The name of the database where the collections are located.
usersCollection = "kawiso.users" # The name of the collection where users data are stored.
analyticsDataCollection = "kawiso.analytics" # The name of the collection where analytics data are stored.

[security]
cookieMasterKey = "" # The master key for the cookie encryption. The more complex and long, the better.
cookieEncoding = "hex" #  hex, base64, latin1
cookiePBKDF2Iterations = 16000 # The PBKDF2Iterations for the cookie encryption.
cookieSaltLength = 34 # The length of the cookie encryption salt.